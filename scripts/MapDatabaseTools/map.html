<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPad Map</title>
    <!-- Use CDN directly (most reliable in QWebEngineView) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        #status { position: absolute; top: 10px; left: 10px; z-index: 1000; 
                  background: rgba(255,255,255,0.9); padding: 5px 10px; 
                  border-radius: 3px; font-size: 12px; display: none; }
        /* Map hamburger control */
        #map-controls { position: absolute; top: 10px; right: 10px; z-index: 1100; }
        #map-controls #map-menu-btn { background: rgba(255,255,255,0.9); border: none; padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #map-controls #map-menu { margin-top: 6px; background: rgba(255,255,255,0.95); border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); overflow: hidden; }
        #map-controls #map-menu.hidden { display: none; }
        #map-controls #map-menu button { display: block; width: 160px; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; }
        #map-controls #map-menu button:hover { background: rgba(0,0,0,0.06); }
        #map-controls #map-menu .menu-divider { border-top: 1px solid rgba(0,0,0,0.1); margin: 4px 0; }
        #map-controls #map-menu label { display: block; width: 160px; padding: 8px 12px; cursor: pointer; user-select: none; }
        #map-controls #map-menu label:hover { background: rgba(0,0,0,0.06); }
        #map-controls #map-menu input[type="checkbox"] { margin-right: 8px; }
        
        /* Compass Widget */
        #compass-widget { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            z-index: 1100;
            background: transparent; /* fully transparent */
            border-radius: 8px;
            padding: 6px;
            width: auto;
            cursor: move;
            -webkit-user-select: none;
            user-select: none;
        }
        #compass-widget.hidden { display: none; }
        #compass-widget.dragging { cursor: grabbing; }
        #compass-canvas {
            width: 320px;
            height: 320px;
            cursor: move; /* clicking canvas will move widget */
            user-select: none;
            background: transparent; /* no background */
            border-radius: 50%;
            box-shadow: none; /* remove shadow */
            display: block;
        }
        #compass-canvas:active { cursor: grabbing; }
        #compass-controls {
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: transparent; /* transparent controls bar */
            padding: 2px 4px;
            border-radius: 5px;
        }
        #compass-heading {
            font-size: 20px;
            font-weight: bold;
            color: #fff; /* white for visibility on map */
            text-align: center;
            flex: 1;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }
        #compass-controls button {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        #compass-controls button:hover { background: rgba(255, 255, 255, 0.18); }
        #compass-toggle {
            position: absolute;
            top: 10px;
            right: 200px;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        #compass-toggle:hover { background: rgba(255, 255, 255, 1); }
    </style>
</head>
<body>
    <div id="status">Loading map...</div>
    <div id="map"></div>
    
    <!-- Compass Toggle Button -->
    <button id="compass-toggle" title="Toggle Compass">🧭</button>
    
    <!-- Compass Widget -->
    <div id="compass-widget" class="hidden">
        <canvas id="compass-canvas" width="320" height="320" aria-label="Compass"></canvas>
        <div id="compass-controls">
            <button id="compass-reset" title="Reset to North">↻</button>
            <div id="compass-heading">0°</div>
            <button id="compass-lock" title="Compass locked to map north" disabled>🔒</button>
        </div>
    </div>

    <!-- Load Leaflet from CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <!-- Rotated marker plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>

    <script>
        // Wait for everything to load
        window.addEventListener('load', function() {
            var statusEl = document.getElementById('status');
            
            try {
                if (typeof L === 'undefined') {
                    statusEl.textContent = 'ERROR: Leaflet failed to load';
                    statusEl.style.display = 'block';
                    statusEl.style.background = 'rgba(255,0,0,0.9)';
                    statusEl.style.color = 'white';
                    return;
                }
                
                var map = L.map('map', { zoomControl: true }).setView([48.0, 11.0], 6);

                // Define base tile layers
                var baseLayers = {
                    'normal': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '© OpenStreetMap contributors'
                    }),
                    'dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '© CartoDB'
                    }),
                    'topo': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                        maxZoom: 17,
                        attribution: '© OpenTopoMap (CC-BY-SA)'
                    }),
                    'satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        maxZoom: 19,
                        attribution: '© ESRI World Imagery'
                    })
                };

                // Add default layer
                var currentLayerName = 'normal';
                var currentLayer = baseLayers[currentLayerName];
                currentLayer.addTo(map);

                statusEl.textContent = 'Map loaded successfully';
                statusEl.style.display = 'block';
                statusEl.style.background = 'rgba(0,255,0,0.7)';
                setTimeout(function() { statusEl.style.display = 'none'; }, 2000);

                // Add map controls for layer switching
                var controlsContainer = document.createElement('div');
                controlsContainer.id = 'map-controls';
                controlsContainer.innerHTML = '<button id="map-menu-btn" title="Map layers">☰</button>' +
                    '<div id="map-menu" class="hidden">' +
                    '<button data-layer="normal">Normal</button>' +
                    '<button data-layer="dark">Dark</button>' +
                    '<button data-layer="topo">Topographic</button>' +
                    '<button data-layer="satellite">Satellite</button>' +
                    '<div class="menu-divider"></div>' +
                    '<label><input type="checkbox" id="mgrs-toggle"> MGRS Grid</label>' +
                    '</div>';
                document.body.appendChild(controlsContainer);

                // Simple menu interactions
                var menuBtn = document.getElementById('map-menu-btn');
                var menu = document.getElementById('map-menu');
                menuBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    menu.classList.toggle('hidden');
                });
                // Close when clicking outside
                document.addEventListener('click', function() { menu.classList.add('hidden'); });

                // Handle layer change clicks
                menu.querySelectorAll('button[data-layer]').forEach(function(b) {
                    b.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var layer = b.getAttribute('data-layer');
                        setMapLayer(layer);
                        menu.classList.add('hidden');
                    });
                });

                // MGRS Grid overlay implementation
                var MgrsGridOverlay = L.GridLayer.extend({
                    createTile: function(coords) {
                        var tile = document.createElement('canvas');
                        var tileSize = this.getTileSize();
                        tile.width = tileSize.x;
                        tile.height = tileSize.y;
                        
                        var ctx = tile.getContext('2d');
                        this.drawGrid(ctx, coords, tileSize);
                        
                        return tile;
                    },
                    
                    drawGrid: function(ctx, coords, tileSize) {
                        var zoom = this._map.getZoom();
                        
                        // Calculate grid spacing based on zoom
                        var gridSpacing;
                        if (zoom >= 15) gridSpacing = 0.001; // ~100m
                        else if (zoom >= 13) gridSpacing = 0.01; // ~1km
                        else if (zoom >= 10) gridSpacing = 0.1; // ~10km
                        else gridSpacing = 1.0; // ~100km
                        
                        var nwPoint = coords.scaleBy(tileSize);
                        var sePoint = nwPoint.add(tileSize);
                        
                        var nw = this._map.unproject(nwPoint, coords.z);
                        var se = this._map.unproject(sePoint, coords.z);
                        
                        // Red with transparency
                        ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.font = '12px Arial';
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                        
                        // Draw vertical lines (longitude)
                        var lon = Math.floor(nw.lng / gridSpacing) * gridSpacing;
                        while (lon <= se.lng) {
                            var topPx = this._map.project(L.latLng(nw.lat, lon), coords.z);
                            var bottomPx = this._map.project(L.latLng(se.lat, lon), coords.z);
                            
                            var x = topPx.x - nwPoint.x;
                            var y1 = topPx.y - nwPoint.y;
                            var y2 = bottomPx.y - nwPoint.y;
                            
                            if (x >= 0 && x <= tileSize.x) {
                                ctx.beginPath();
                                ctx.moveTo(x, Math.max(0, y1));
                                ctx.lineTo(x, Math.min(tileSize.y, y2));
                                ctx.stroke();
                                
                                // Label
                                if (y1 < 20 && y1 > -20) {
                                    var label = this.formatCoord(lon, true);
                                    ctx.fillText(label, x + 2, 15);
                                }
                            }
                            
                            lon += gridSpacing;
                        }
                        
                        // Draw horizontal lines (latitude)
                        var lat = Math.floor(se.lat / gridSpacing) * gridSpacing;
                        while (lat <= nw.lat) {
                            var leftPx = this._map.project(L.latLng(lat, nw.lng), coords.z);
                            var rightPx = this._map.project(L.latLng(lat, se.lng), coords.z);
                            
                            var y = leftPx.y - nwPoint.y;
                            var x1 = leftPx.x - nwPoint.x;
                            var x2 = rightPx.x - nwPoint.x;
                            
                            if (y >= 0 && y <= tileSize.y) {
                                ctx.beginPath();
                                ctx.moveTo(Math.max(0, x1), y);
                                ctx.lineTo(Math.min(tileSize.x, x2), y);
                                ctx.stroke();
                                
                                // Label
                                if (x1 < 50 && x1 > -50) {
                                    var label = this.formatCoord(lat, false);
                                    ctx.fillText(label, 5, y - 2);
                                }
                            }
                            
                            lat += gridSpacing;
                        }
                    },
                    
                    formatCoord: function(value, isLon) {
                        var deg = Math.floor(Math.abs(value));
                        var min = Math.floor((Math.abs(value) - deg) * 60);
                        var dir = isLon ? (value >= 0 ? 'E' : 'W') : (value >= 0 ? 'N' : 'S');
                        return deg + '°' + (min < 10 ? '0' : '') + min + "'" + dir;
                    }
                });

                // MGRS toggle handler
                var mgrsToggle = document.getElementById('mgrs-toggle');
                
                // Load saved state from localStorage
                var mgrsEnabled = localStorage.getItem('mgrs_grid_enabled') === 'true';
                mgrsToggle.checked = mgrsEnabled;
                
                // Apply initial state
                if (mgrsEnabled) {
                    mgrsGridLayer = new MgrsGridOverlay({ opacity: 1.0 });
                    mgrsGridLayer.addTo(map);
                }
                
                mgrsToggle.addEventListener('change', function(e) {
                    e.stopPropagation();
                    var enabled = mgrsToggle.checked;
                    
                    // Save state
                    localStorage.setItem('mgrs_grid_enabled', enabled.toString());
                    
                    if (enabled) {
                        if (mgrsGridLayer) {
                            map.removeLayer(mgrsGridLayer);
                        }
                        mgrsGridLayer = new MgrsGridOverlay({ opacity: 1.0 });
                        mgrsGridLayer.addTo(map);
                    } else {
                        if (mgrsGridLayer) {
                            map.removeLayer(mgrsGridLayer);
                            mgrsGridLayer = null;
                        }
                    }
                });

                var aircraftMarker = null;
                var markersLayer = L.layerGroup().addTo(map);
                var locationMarkers = {};
                var bordersLayer = L.layerGroup().addTo(map);
                var borderPolygons = {};
                var mgrsGridLayer = null;

                // Layer for drawing selected marker runway centerlines
                var runwayLinesLayer = L.layerGroup().addTo(map);
                
                // Border drawing state
                var isDrawingBorder = false;
                var drawingPoints = [];
                var drawingMarkers = [];
                var drawingLines = [];

                window.setMarker = function(lat, lon, heading, center) {
                    try {
                        var latnum = Number(lat);
                        var lonnum = Number(lon);
                        var head = Number(heading) || 0;
                        var doCenter = (center === true || center === 'true');
                        
                        if (!aircraftMarker) {
                            // Use default blue marker but rotated
                            aircraftMarker = L.marker([latnum, lonnum], { 
                                rotationAngle: head, 
                                rotationOrigin: 'center center' 
                            }).addTo(map);
                            aircraftMarker.bindPopup('Aircraft position');
                        } else {
                            aircraftMarker.setLatLng([latnum, lonnum]);
                            if (typeof aircraftMarker.setRotationAngle === 'function') {
                                aircraftMarker.setRotationAngle(head);
                            }
                        }

                        // Update popup content
                        try { aircraftMarker.setPopupContent('Heading: ' + Math.round(head) + '°'); } catch (e) {}

                        if (doCenter) {
                            map.setView([latnum, lonnum]);
                        }
                    } catch (e) {
                        console.error('setMarker error', e);
                    }
                };

                // Expose a function to switch base layers programmatically
                window.setMapLayer = function(layerName) {
                    try {
                        if (!baseLayers[layerName]) { console.warn('Unknown layer', layerName); return; }
                        if (currentLayer) { map.removeLayer(currentLayer); }
                        currentLayer = baseLayers[layerName];
                        currentLayer.addTo(map);
                        currentLayerName = layerName;
                    } catch (e) {
                        console.error('setMapLayer error', e);
                    }
                };

                function setMapLayer(layerName) {
                    window.setMapLayer(layerName);
                }
                
                window.centerMap = function(lat, lon) {
                    try {
                        var latnum = Number(lat);
                        var lonnum = Number(lon);
                        map.setView([latnum, lonnum], map.getZoom() > 10 ? map.getZoom() : 10);
                    } catch (e) {
                        console.error('centerMap error', e);
                    }
                };
                
                window.updateMarkers = function(markers) {
                    try {
                        // markers is already a JS object (no need to parse)
                        
                        // Clear existing markers
                        markersLayer.clearLayers();
                        locationMarkers = {};

                        // Debug: show first marker icon keys/size
                        if (markers.length > 0) {
                            try {
                                console.log('First marker icon keys:', markers[0] && markers[0].icon ? Object.keys(markers[0].icon) : 'none');
                                console.log('First marker icon html length:', markers[0] && markers[0].icon && markers[0].icon.html ? markers[0].icon.html.length : 0);
                            } catch (e) {}
                        }

                        // Add new markers
                        markers.forEach(function(m) {
                            try {
                                // Create icon from HTML
                                var icon = L.divIcon({
                                    html: m.icon.html,
                                    className: m.icon.className || 'custom-marker',
                                    iconSize: m.icon.iconSize || [24, 24],
                                    iconAnchor: m.icon.iconAnchor || [12, 12],
                                    popupAnchor: m.icon.popupAnchor || [0, -12]
                                });
                                
                                var marker = L.marker([m.lat, m.lon], { icon: icon });

                                // Track clicks on marker, make available to Python via getClickedMarker()
                                marker.on('click', function() {
                                    try { window._lastClickedMarker = m.id; } catch(e) {}
                                });
                                
                                // Build popup content with Edit button
                                var popupContent = '<div style="font-family: sans-serif;">';
                                popupContent += '<h3 style="margin: 0 0 5px 0;">' + m.name + '</h3>';
                                popupContent += '<div style="margin-top:6px;">';
                                popupContent += '<button onclick="try{ window.requestEditMarker(' + m.id + '); }catch(e){}" style="padding:4px 8px;margin-right:6px;">✏️ Edit</button>';
                                
                                if (m.icao) {
                                    popupContent += '<p style="margin: 2px 0;"><b>ICAO:</b> ' + m.icao + '</p>';
                                }
                                
                                if (m.runways) {
                                    popupContent += '<p style="margin: 2px 0;"><b>Runways:</b> ' + m.runways + '</p>';
                                }
                                
                                if (m.coalition) {
                                    var coalColor = m.coalition === 'BLUFOR' ? '#00A8FF' : 
                                                   m.coalition === 'OPFOR' ? '#FF4444' : '#00FF00';
                                    popupContent += '<p style="margin: 2px 0;"><b>Coalition:</b> <span style="color:' + coalColor + ';">' + m.coalition + '</span></p>';
                                }
                                
                                if (m.threat) {
                                    var threatStr = '⚠️'.repeat(m.threat);
                                    popupContent += '<p style="margin: 2px 0;"><b>Threat:</b> ' + threatStr + '</p>';
                                }
                                
                                if (m.description) {
                                    popupContent += '<p style="margin: 5px 0; font-size: 11px; color: #666;">' + m.description + '</p>';
                                }
                                
                                popupContent += '<p style="margin: 5px 0 0 0; font-size: 10px; color: #999;">';
                                popupContent += m.lat.toFixed(6) + ', ' + m.lon.toFixed(6);
                                popupContent += '</p></div>';
                                
                                marker.bindPopup(popupContent);
                                
                                markersLayer.addLayer(marker);
                                // Attach runway headings data (if any) to marker for later visualization
                                try { marker.runway_headings = m.runway_headings || []; marker.options.runway_headings = m.runway_headings || []; } catch (e) {}
                                locationMarkers[m.id] = marker;
                                
                            } catch (e) {
                                console.error('Error adding marker:', e, m);
                            }
                        });

                        // Function to compute destination point given bearing and distance (meters)
                        function destinationPoint(lat, lon, bearing, distance_m) {
                            var R = 6371000; // Earth radius in meters
                            var br = bearing * Math.PI / 180;
                            var lat1 = lat * Math.PI / 180;
                            var lon1 = lon * Math.PI / 180;
                            var d = distance_m / R;
                            var lat2 = Math.asin(Math.sin(lat1) * Math.cos(d) + Math.cos(lat1) * Math.sin(d) * Math.cos(br));
                            var lon2 = lon1 + Math.atan2(Math.sin(br) * Math.sin(d) * Math.cos(lat1), Math.cos(d) - Math.sin(lat1) * Math.sin(lat2));
                            return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
                        }

                        // Clear existing runway lines
                        window.clearRunwayLines = function() {
                            try {
                                runwayLinesLayer.clearLayers();
                            } catch (e) { console.error('clearRunwayLines', e); }
                        };

                        // Draw runway centerlines for a given marker id using supplied runway_headings in marker data
                        window.showRunwayHeadings = function(markerId) {
                            try {
                                runwayLinesLayer.clearLayers();
                                if (!locationMarkers[markerId]) return;
                                var marker = locationMarkers[markerId];
                                var lat = marker.getLatLng().lat;
                                var lon = marker.getLatLng().lng;
                                var mdata = null;
                                // Try to find the original data object; it's not stored directly, so
                                // we rely on markers array closure in updateMarkers - workaround: markersLayer.eachLayer
                                markersLayer.eachLayer(function(layer) {
                                    if (layer && layer.getLatLng && layer.getLatLng().lat === lat && layer.getLatLng().lng === lon) {
                                        // try to get stored marker options or bind to popup content hint
                                    }
                                });
                                // Instead, request runway headings from window._lastMarkerRunways if available
                                // To keep things simple, we also store runway data on the marker object itself in updateMarkers
                                var runways = marker.options.runway_headings || marker.runway_headings || [];

                                if (!runways || runways.length === 0) {
                                    // Nothing to draw
                                    return;
                                }

                                runways.forEach(function(r) {
                                    var heading = Number(r.heading) || 0;
                                    var length_m = r.length_m && Number(r.length_m) > 0 ? Number(r.length_m) : 1000; // default 1 km
                                    var half = length_m / 2.0;

                                    var pt1 = destinationPoint(lat, lon, heading, half);
                                    var pt2 = destinationPoint(lat, lon, (heading + 180) % 360, half);

                                    var line = L.polyline([pt1, pt2], { color: '#FF8800', weight: 3, opacity: 0.9, dashArray: '8,6' });
                                    line.addTo(runwayLinesLayer);
                                });

                                // Optionally zoom slightly to show the lines
                                // Here we pan to marker to ensure visibility
                                map.panTo([lat, lon]);

                            } catch (e) { console.error('showRunwayHeadings error', e); }
                        };

                        // Provide getters for Python to poll for marker interactions
                        window.getClickedMarker = function() {
                            try {
                                var id = window._lastClickedMarker || null;
                                window._lastClickedMarker = null;
                                return JSON.stringify(id);
                            } catch (e) {
                                return JSON.stringify(null);
                            }
                        };

                        window.requestEditMarker = function(id) {
                            try { window._popupEditId = id; } catch (e) {}
                        };

                        window.getPopupEditRequest = function() {
                            try {
                                var id = window._popupEditId || null;
                                window._popupEditId = null;
                                return JSON.stringify(id);
                            } catch (e) {
                                return JSON.stringify(null);
                            }
                        };

                        
                        console.log('Updated ' + markers.length + ' markers');
                        
                    } catch (e) {
                        console.error('updateMarkers error', e);
                    }
                };
                
                // Border drawing and display functions
                window.startBorderDrawing = function() {
                    isDrawingBorder = true;
                    drawingPoints = [];
                    clearDrawingMarkers();
                    console.log('Border drawing mode activated');
                };
                
                window.stopBorderDrawing = function() {
                    isDrawingBorder = false;
                    clearDrawingMarkers();
                    console.log('Border drawing mode deactivated');
                };
                
                function clearDrawingMarkers() {
                    // Remove all drawing markers and lines
                    drawingMarkers.forEach(function(marker) {
                        map.removeLayer(marker);
                    });
                    drawingLines.forEach(function(line) {
                        map.removeLayer(line);
                    });
                    drawingMarkers = [];
                    drawingLines = [];
                }
                
                window.addBorderPoint = function(lat, lon) {
                    if (!isDrawingBorder) return;
                    
                    // Add point to list
                    drawingPoints.push([lat, lon]);
                    
                    // Add marker with emoji
                    var icon = L.divIcon({
                        html: drawingPoints.length === 1 ? '📍' : '📌',
                        className: 'border-point-marker',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    
                    var marker = L.marker([lat, lon], { icon: icon }).addTo(map);
                    marker.bindPopup('Point ' + drawingPoints.length);
                    drawingMarkers.push(marker);
                    
                    // If this is the first marker, add a click handler to allow closing by clicking it
                    if (drawingMarkers.length === 1) {
                        marker.on('click', function(e) {
                            if (!isDrawingBorder) return;
                            // Only allow closing when we have at least 3 points
                            if (drawingPoints.length >= 3) {
                                // Prevent popup from staying open
                                try {
                                    if (e && e.originalEvent && typeof e.originalEvent.stopImmediatePropagation === 'function') {
                                        e.originalEvent.stopImmediatePropagation();
                                    }
                                } catch (ex) {}
                                try { marker.closePopup(); } catch (ex) {}
                                // Notify python that we want to close the polygon by pushing a closure event
                                window.borderClickCallbacks.push({
                                    lat: drawingPoints[0][0],
                                    lon: drawingPoints[0][1],
                                    shouldClose: true,
                                    pointCount: drawingPoints.length
                                });
                            }
                        });
                    }
                    
                    // Draw line from previous point
                    if (drawingPoints.length > 1) {
                        var prevPoint = drawingPoints[drawingPoints.length - 2];
                        var line = L.polyline([prevPoint, [lat, lon]], {
                            color: '#FF6600',
                            weight: 3,
                            dashArray: '5, 10'
                        }).addTo(map);
                        drawingLines.push(line);
                    }
                    
                    console.log('Added border point:', lat, lon, '(Total:', drawingPoints.length, ')');
                };
                
                // Callback queue for border clicks
                window.borderClickCallbacks = [];
                
                window.getBorderClicks = function() {
                    var clicks = window.borderClickCallbacks.slice();
                    window.borderClickCallbacks = [];
                    return JSON.stringify(clicks);
                };
                
                // Map click handler for border drawing
                map.on('click', function(e) {
                    if (isDrawingBorder) {
                        var lat = e.latlng.lat;
                        var lon = e.latlng.lng;
                        
                        // Check if clicked near first point (to close polygon)
                        var shouldClose = false;
                        if (drawingPoints.length >= 3) {
                            var firstPoint = drawingPoints[0];
                            var distance = Math.sqrt(
                                Math.pow(lat - firstPoint[0], 2) + 
                                Math.pow(lon - firstPoint[1], 2)
                            );
                            
                            // If clicked within ~100m of first point, close polygon
                            if (distance < 0.001) {
                                console.log('Closing border polygon');
                                shouldClose = true;
                            }
                        }
                        
                        window.addBorderPoint(lat, lon);
                        
                        // Notify Python of the click
                        window.borderClickCallbacks.push({
                            lat: lat,
                            lon: lon,
                            shouldClose: shouldClose,
                            pointCount: drawingPoints.length
                        });
                    }
                });
                
                window.updateBorders = function(borders) {
                    try {
                        // borders is already a JS object (no need to parse)
                        
                        // Clear existing borders
                        bordersLayer.clearLayers();
                        borderPolygons = {};
                        
                        // Add new borders
                        borders.forEach(function(b) {
                            try {
                                if (!b.points || b.points.length < 3) {
                                    console.warn('Invalid border (not enough points):', b);
                                    return;
                                }
                                
                                // Create polygon
                                var polygon = L.polygon(b.points, {
                                    color: b.color || '#FF0000',
                                    weight: 3,
                                    fillColor: b.color || '#FF0000',
                                    fillOpacity: 0.1
                                });
                                
                                // Build popup content
                                var popupContent = '<div style="font-family: sans-serif;">';
                                popupContent += '<h3 style="margin: 0 0 5px 0;">🗺️ ' + b.name + '</h3>';
                                
                                if (b.description) {
                                    popupContent += '<p style="margin: 2px 0;">' + b.description + '</p>';
                                }
                                
                                popupContent += '<p style="margin: 5px 0 0 0; font-size: 10px; color: #999;">';
                                popupContent += b.points.length + ' boundary points';
                                popupContent += '</p></div>';
                                
                                polygon.bindPopup(popupContent);
                                
                                bordersLayer.addLayer(polygon);
                                borderPolygons[b.id] = polygon;
                                
                            } catch (e) {
                                console.error('Error adding border:', e, b);
                            }
                        });
                        
                        console.log('Updated ' + borders.length + ' borders');
                        
                    } catch (e) {
                        console.error('updateBorders error', e);
                    }
                };

                // Draw a closing line/polygon for current drawing (visual feedback)
                window.drawClosingLine = function(points) {
                    try {
                        if (!points || points.length < 2) return;
                        var first = points[0];
                        var last = points[points.length - 1];
                        // Draw solid closing line
                        var closeLine = L.polyline([last, first], { color: '#FF6600', weight: 4 }).addTo(map);
                        // Draw temporary polygon fill to show closure
                        var poly = L.polygon(points, { color: '#FF6600', weight: 3, fillColor: '#FF6600', fillOpacity: 0.12 }).addTo(map);
                        // Remove after short delay (the saved border will be shown by updateBorders)
                        setTimeout(function() {
                            try { map.removeLayer(closeLine); } catch (e) {}
                            try { map.removeLayer(poly); } catch (e) {}
                        }, 900);
                    } catch (e) {
                        console.error('drawClosingLine error', e);
                    }
                };
                // ===========================================
                // COMPASS WIDGET IMPLEMENTATION
                // ===========================================
                
                var compassWidget = document.getElementById('compass-widget');
                var compassCanvas = document.getElementById('compass-canvas');
                var compassHeading = document.getElementById('compass-heading');
                var compassToggle = document.getElementById('compass-toggle');
                var compassResetBtn = document.getElementById('compass-reset');
                var compassLockBtn = document.getElementById('compass-lock');
                
                var compassRotation = 0; // Current rotation in degrees
                // Compass is fixed to map north by default (non-rotatable)
                var compassLocked = true;
                var compassDragging = false;
                var compassRotating = false;
                
                // Widget dragging state
                var widgetDragging = false;
                var widgetDragOffset = { x: 0, y: 0 };
                
                // Load saved state
                var compassVisible = localStorage.getItem('compass_visible') === 'true';
                var savedPosition = localStorage.getItem('compass_position');
                
                if (compassVisible) {
                    compassWidget.classList.remove('hidden');
                }
                
                // Restore saved position
                if (savedPosition) {
                    try {
                        var pos = JSON.parse(savedPosition);
                        compassWidget.style.right = 'auto';
                        compassWidget.style.bottom = 'auto';
                        compassWidget.style.left = pos.x + 'px';
                        compassWidget.style.top = pos.y + 'px';
                    } catch (e) {
                        console.error('Failed to restore compass position', e);
                    }
                }
                
                // Ensure lock button shows locked and cannot be toggled (compass fixed to map north)
                try {
                    compassLockBtn.textContent = '🔒';
                    compassLockBtn.title = 'Compass locked to map north (not rotatable)';
                    compassLockBtn.disabled = true;
                    compassCanvas.style.cursor = 'default';
                } catch (e) {
                    // If button missing, ignore
                }
                
                // Toggle compass visibility
                compassToggle.addEventListener('click', function() {
                    compassWidget.classList.toggle('hidden');
                    var visible = !compassWidget.classList.contains('hidden');
                    localStorage.setItem('compass_visible', visible.toString());
                });
                
                // Draw compass rose dynamically scaled to canvas size
                function drawCompass() {
                    var ctx = compassCanvas.getContext('2d');
                    var width = compassCanvas.width;
                    var height = compassCanvas.height;
                    var centerX = width / 2;
                    var centerY = height / 2;
                    var radius = Math.min(width, height) / 2 - 16; // padding
                    
                    // Clear canvas
                    ctx.clearRect(0, 0, width, height);
                    
                    // Background subtle ring for visibility
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius + 10, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(0,0,0,0)'; // fully transparent
                    ctx.fill();
                    
                    // Save state (no rotation because compass is fixed to map north)
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    
                    // Draw outer circle (thin and semi-transparent for visibility)
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, 0, 2 * Math.PI);
                    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                    ctx.lineWidth = Math.max(2, Math.round(radius * 0.02));
                    ctx.stroke();
                    
                    // Draw degree tick marks (5° resolution, numeric labels every 10°)
                    for (var i = 0; i < 360; i += 5) {
                        var angle = (i * Math.PI) / 180;
                        var isMajor = i % 10 === 0; // label every 10°
                        var tickLength = isMajor ? Math.round(radius * 0.08) : Math.round(radius * 0.04);
                        var tickWidth = isMajor ? Math.max(2, Math.round(radius * 0.01)) : Math.max(1, Math.round(radius * 0.006));
                        
                        var x1 = Math.sin(angle) * (radius - tickLength);
                        var y1 = -Math.cos(angle) * (radius - tickLength);
                        var x2 = Math.sin(angle) * radius;
                        var y2 = -Math.cos(angle) * radius;
                        
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                        ctx.lineWidth = tickWidth;
                        ctx.stroke();
                        
                        // Draw numeric labels every 10° (skip cardinal letters which are drawn separately)
                        if (isMajor && (i % 90 !== 0)) {
                            ctx.save();
                            var labelRadius = radius - tickLength - Math.round(radius * 0.06);
                            ctx.translate(Math.sin(angle) * labelRadius, -Math.cos(angle) * labelRadius);
                            ctx.rotate(-((compassRotation + i) * Math.PI) / 180);
                            ctx.font = Math.max(12, Math.round(radius * 0.08)) + 'px Arial';
                            ctx.fillStyle = 'rgba(255,255,255,0.95)';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(i.toString(), 0, 0);
                            ctx.restore();
                        }
                    }
                    
                    // Draw cardinal direction labels
                    var directions = [
                        { angle: 0, label: 'N', color: '#ff4d4d' },
                        { angle: 90, label: 'E', color: 'rgba(255,255,255,0.95)' },
                        { angle: 180, label: 'S', color: 'rgba(255,255,255,0.95)' },
                        { angle: 270, label: 'W', color: 'rgba(255,255,255,0.95)' }
                    ];
                    directions.forEach(function(dir) {
                        var angle = (dir.angle * Math.PI) / 180;
                        var labelRadius = radius - Math.round(radius * 0.16);
                        var x = Math.sin(angle) * labelRadius;
                        var y = -Math.cos(angle) * labelRadius;
                        
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(-((compassRotation + dir.angle) * Math.PI) / 180);
                        ctx.font = 'bold ' + Math.max(16, Math.round(radius * 0.12)) + 'px Arial';
                        ctx.fillStyle = dir.color;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(dir.label, 0, 0);
                        ctx.restore();
                    });
                    
                    // Draw north arrow (fixed, non-rotating reference)
                    ctx.restore();
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    var arrowH = Math.max(20, Math.round(radius * 0.12));
                    var arrowW = Math.max(10, Math.round(radius * 0.06));
                    ctx.beginPath();
                    ctx.moveTo(0, -radius + 6);
                    ctx.lineTo(-arrowW, -radius + arrowH);
                    ctx.lineTo(0, -radius + Math.round(arrowH*0.8));
                    ctx.lineTo(arrowW, -radius + arrowH);
                    ctx.closePath();
                    ctx.fillStyle = '#ff4d4d';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                    ctx.lineWidth = Math.max(1, Math.round(radius * 0.01));
                    ctx.stroke();
                    
                    // Draw center dot
                    ctx.beginPath();
                    ctx.arc(0, 0, Math.max(5, Math.round(radius * 0.03)), 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.fill();
                    
                    ctx.restore();
                }
                
                // Update heading display
                function updateHeading() {
                    var normalized = ((compassRotation % 360) + 360) % 360;
                    compassHeading.textContent = Math.round(normalized) + '°';
                    drawCompass();
                }
                
                // Widget dragging (move entire compass). Allow dragging when clicking on canvas as well.
                compassWidget.addEventListener('mousedown', function(e) {
                    // Start widget drag if clicking on the widget container or the canvas
                    if (e.target === compassWidget || e.target === compassCanvas) {
                        widgetDragging = true;
                        var rect = compassWidget.getBoundingClientRect();
                        widgetDragOffset.x = e.clientX - rect.left;
                        widgetDragOffset.y = e.clientY - rect.top;
                        compassWidget.classList.add('dragging');
                        e.preventDefault();
                        e.stopPropagation();
                    }
                });
                
                // Mouse/touch interaction for rotating compass (disabled because compass locked)
                compassCanvas.addEventListener('mousedown', function(e) {
                    // rotation disabled; prevent accidental text selection
                    e.preventDefault();
                    e.stopPropagation();
                });
                
                document.addEventListener('mousemove', function(e) {
                    // Widget dragging
                    if (widgetDragging) {
                        var x = e.clientX - widgetDragOffset.x;
                        var y = e.clientY - widgetDragOffset.y;
                        
                        // Keep within window bounds
                        x = Math.max(0, Math.min(x, window.innerWidth - compassWidget.offsetWidth));
                        y = Math.max(0, Math.min(y, window.innerHeight - compassWidget.offsetHeight));
                        
                        compassWidget.style.left = x + 'px';
                        compassWidget.style.top = y + 'px';
                        compassWidget.style.right = 'auto';
                        compassWidget.style.bottom = 'auto';
                        
                        return;
                    }
                    
                    // Compass rotation
                    if (compassRotating && !compassLocked) {
                        var rect = compassCanvas.getBoundingClientRect();
                        var centerX = rect.left + rect.width / 2;
                        var centerY = rect.top + rect.height / 2;
                        
                        var dx = e.clientX - centerX;
                        var dy = e.clientY - centerY;
                        
                        // Calculate angle from center
                        var angle = Math.atan2(dx, -dy) * (180 / Math.PI);
                        compassRotation = angle;
                        
                        updateHeading();
                    }
                });
                
                document.addEventListener('mouseup', function() {
                    if (widgetDragging) {
                        widgetDragging = false;
                        compassWidget.classList.remove('dragging');
                        
                        // Save position
                        var rect = compassWidget.getBoundingClientRect();
                        var position = {
                            x: rect.left,
                            y: rect.top
                        };
                        localStorage.setItem('compass_position', JSON.stringify(position));
                    }
                    compassRotating = false;
                });
                
                // Reset button
                compassResetBtn.addEventListener('click', function() {
                    compassRotation = 0;
                    updateHeading();
                });
                
                // Lock button
                compassLockBtn.addEventListener('click', function() {
                    compassLocked = !compassLocked;
                    compassLockBtn.textContent = compassLocked ? '🔒' : '🔓';
                    compassLockBtn.title = compassLocked ? 'Unlock rotation' : 'Lock rotation';
                    compassCanvas.style.cursor = compassLocked ? 'default' : 'grab';
                    drawCompass();
                });
                
                // Initial draw
                updateHeading();
                
                // Expose function to set compass rotation from external code
                window.setCompassRotation = function(degrees) {
                    compassRotation = degrees;
                    updateHeading();
                };
                
                window.getCompassRotation = function() {
                    return ((compassRotation % 360) + 360) % 360;
                };

                // ===========================================
                // END COMPASS WIDGET
                // ===========================================
                // Coordinate picking state
                var isPickingCoordinate = false;
                var pickedCoordinate = null;
                var coordinatePickMarker = null;

                window.startCoordinatePicking = function() {
                    try {
                        console.log('Starting coordinate picking mode');
                        isPickingCoordinate = true;
                        pickedCoordinate = null;

                        // Change cursor to crosshair
                        map.getContainer().style.cursor = 'crosshair';

                        // Clear any previous marker
                        if (coordinatePickMarker) {
                            map.removeLayer(coordinatePickMarker);
                            coordinatePickMarker = null;
                        }
                    } catch (e) {
                        console.error('startCoordinatePicking error', e);
                    }
                };

                window.stopCoordinatePicking = function() {
                    try {
                        console.log('Stopping coordinate picking mode');
                        isPickingCoordinate = false;

                        // Reset cursor
                        map.getContainer().style.cursor = '';

                        // Remove marker
                        if (coordinatePickMarker) {
                            map.removeLayer(coordinatePickMarker);
                            coordinatePickMarker = null;
                        }
                    } catch (e) {
                        console.error('stopCoordinatePicking error', e);
                    }
                };

                window.getPickedCoordinate = function() {
                    try {
                        if (!pickedCoordinate) {
                            return null;
                        }
                        var coord = pickedCoordinate;
                        pickedCoordinate = null; // Clear after retrieval
                        return JSON.stringify(coord);
                    } catch (e) {
                        console.error('getPickedCoordinate error', e);
                        return null;
                    }
                };

                // Enhanced map click handler for both border drawing and coordinate picking
                var originalClickHandler = map._events.click;
                map.on('click', function(e) {
                    // Coordinate picking takes priority
                    if (isPickingCoordinate) {
                        var lat = e.latlng.lat;
                        var lon = e.latlng.lng;

                        console.log('Coordinate picked:', lat, lon);

                        // Store the picked coordinate
                        pickedCoordinate = { lat: lat, lon: lon };

                        // Place a temporary marker to show the selected location
                        if (coordinatePickMarker) {
                            map.removeLayer(coordinatePickMarker);
                        }

                        var icon = L.divIcon({
                            html: '📍',
                            className: 'coordinate-pick-marker',
                            iconSize: [32, 32],
                            iconAnchor: [16, 32]
                        });

                        coordinatePickMarker = L.marker([lat, lon], { icon: icon }).addTo(map);
                        coordinatePickMarker.bindPopup('Selected: ' + lat.toFixed(6) + ', ' + lon.toFixed(6)).openPopup();

                        // Auto-stop picking mode after selection
                        setTimeout(function() {
                            stopCoordinatePicking();
                        }, 500);

                        // Prevent event from bubbling to border drawing
                        if (e.originalEvent) {
                            e.originalEvent.stopImmediatePropagation();
                        }
                        return;
                    }
                });

            } catch (e) {
                statusEl.textContent = 'ERROR: ' + e.message;
                statusEl.style.display = 'block';
                statusEl.style.background = 'rgba(255,0,0,0.9)';
                statusEl.style.color = 'white';
                console.error('Map init error', e);
            }
        });
    </script>
</body>
</html>
