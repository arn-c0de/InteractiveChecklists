<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="theme-color" content="#0d1117">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
        /* Enforce dark mode as highest priority to override theme CSS */
        html[data-theme="dark"], body {
            background-color: #0d1117 !important;
            color: #c9d1d9 !important;
        }
        /* Ensure links and code adopt dark colors */
        a { color: #58a6ff !important; }
        code, pre { background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important; }
    </style>
</head>
<body style="background-color: var(--bg-primary); color: var(--text-primary);">
    <header class="page-header">
        <div class="site-title">{{ site.title }}</div>
    </header>

    <main class="wrapper">
        {{ content }}
    </main>

</body>
</html>
